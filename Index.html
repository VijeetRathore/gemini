                    <div class="radio-grp">
                        <label><input type="radio" name="q${qid}" value="Yes" onclick="document.getElementById('extra_${qid}').style.display='block'"> Yes</label>
                        <label><input type="radio" name="q${qid}" value="No" onclick="document.getElementById('extra_${qid}').style.display='none'"> No</label>
                    </div>
                    <div id="extra_${qid}" style="display:none;">
                        ${(qid >=3 && qid <=10) ? `
                            <input type="text" id="v_${qid}" placeholder="Version No">
                            <input type="date" id="id_${qid}" title="Issue Date">
                            <input type="date" id="ed_${qid}" title="Effective Date">
                        ` : ''}
                        <input type="file" id="f_${qid}" accept="image/*" capture="camera">
                    </div>
                </div>`;
        }

        function getPageRange(p) {
            const ranges = { 1:[1,18], 2:[19,27], 3:[28,37], 4:[38,38], 5:[39,41], 6:[42,42] };
            let r = ranges[p], list = [];
            for(let i=r[0]; i<=r[1]; i++) list.push(i);
            return list;
        }

        function validatePage() {
            const lang = STATE_LANG[document.getElementById('state').value] || 'en';
            const container = document.getElementById(`q-container-${currentPage}`);
            const boxes = container.querySelectorAll('.q-box');
            let valid = true;

            boxes.forEach(box => {
                const qid = box.id.split('_q')[1];
                const checked = box.querySelector(`input[name="q${qid}"]:checked`);
                box.classList.remove('error-highlight');

                if(!checked) {
                    valid = false;
                    box.classList.add('error-highlight');
                } else if(checked.value === "Yes") {
                    const file = document.getElementById(`f_${qid}`);
                    if(file && file.files.length === 0) { valid = false; box.classList.add('error-highlight'); }
                }
            });

            if(!valid) alert(msgLabels[lang]?.pending || "Please fill all required fields");
            return valid;
        }

        async function handleNext() {
            if(!validatePage()) return;
            
            // Show Loading
            document.getElementById('btnNext').innerText = "Saving...";
            document.getElementById('btnNext').disabled = true;

            const payload = {
                submissionId: submissionId,
                pageNumber: currentPage,
                state: document.getElementById('state').value,
                branch: document.getElementById('branch').value,
                branchHead: document.getElementById('branchHead').value,
                officeBoy: document.getElementById('officeBoy').value,
                responses: collectPageData()
            };

            try {
                const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
                const result = await res.json();
                if(result.result === "success") {
                    if(currentPage < 6) changePage(1);
                    else alert("Audit Completed Successfully!");
                }
            } catch(e) { alert("Error saving data"); }
            
            document.getElementById('btnNext').disabled = false;
            updateUIStrings(STATE_LANG[document.getElementById('state').value] || 'en');
        }

        function collectPageData() {
            let data = {};
            const container = document.getElementById(`q-container-${currentPage}`);
            container.querySelectorAll('.q-box').forEach(box => {
                const qid = box.id.split('_q')[1];
                data[qid] = {
                    val: box.querySelector(`input[name="q${qid}"]:checked`).value,
                    version: document.getElementById(`v_${qid}`)?.value || "",
                    issueDate: document.getElementById(`id_${qid}`)?.value || "",
                    effectiveDate: document.getElementById(`ed_${qid}`)?.value || ""
                    // Note: Photo upload requires Base64 conversion logic for full functionality
                };
            });
            return data;
        }

        function changePage(step) {
            document.getElementById(`page${currentPage}`).classList.remove('active');
            currentPage += step;
            document.getElementById(`page${currentPage}`).classList.add('active');
            document.getElementById('btnBack').style.visibility = currentPage > 1 ? 'visible' : 'hidden';
            window.scrollTo(0,0);
        }

        function updateUIStrings(lang) {
            document.getElementById('btnNext').innerText = currentPage === 6 ? (msgLabels[lang]?.success || "Submit") : (msgLabels[lang]?.next || "Next");
            document.getElementById('btnBack').innerText = msgLabels[lang]?.back || "Back";
        }
    </script>
</body>
</html>
